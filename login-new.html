<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/svg+xml" href="icons/app-icon.svg">
    <link rel="apple-touch-icon" href="icons/app-icon.svg">
    <title>Worker Manager - Secure Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#144bb8',
                        'background-light': '#f6f6f8',
                        'background-dark': '#111621'
                    },
                    fontFamily: {
                        display: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
    </style>
</head>
<body class="bg-background-light min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="fixed top-0 left-0 right-0 z-20">
        <div class="mx-auto max-w-4xl px-4 py-3 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <button class="h-10 w-10 grid place-items-center rounded-full border border-slate-200/70 text-slate-600 hover:bg-slate-100" aria-label="Back" onclick="handleBack()">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                </button>
                <div class="flex flex-col leading-tight">
                    <span class="text-[11px] uppercase tracking-wider text-slate-500">Work Manager</span>
                    <h1 class="text-sm font-bold tracking-tight">Secure Login</h1>
                </div>
            </div>
            <div class="relative flex items-center gap-2">
                <button id="menuBtn" class="h-10 w-10 grid place-items-center rounded-full border border-slate-200/70 text-slate-600 hover:bg-slate-100" aria-label="Menu" type="button" onclick="toggleMenu()">
                    <span class="material-symbols-outlined text-[20px]">more_vert</span>
                </button>
                <div id="menuPanel" class="hidden absolute right-0 top-12 min-w-44 bg-white border border-slate-200 rounded-lg shadow-lg py-1">
                    <button type="button" data-install-app class="hidden w-full text-left px-4 py-2 text-sm text-primary hover:bg-slate-50">Install App</button>
                    <button type="button" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" onclick="clearPin()">Clear PIN</button>
                    <button type="button" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" onclick="window.location.reload()">Reload Page</button>
                    <button type="button" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50" onclick="showAlert('Need help? Contact System Administrator', 'success')">Help</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed inset-0 z-0 bg-gradient-to-br from-primary/10 via-background-light to-background-light"></div>

    <div class="relative z-10 w-full max-w-md mt-12">
        <div class="bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
            <div class="pt-10 pb-6 px-8 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-4 shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-white text-4xl">lock_person</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Worker Manager</h2>
                <p class="text-slate-500 mt-1">Enter your PIN to continue</p>
            </div>

            <div class="px-8 pb-10">
                <div id="alert" class="hidden mb-6 rounded-lg border p-4 text-sm font-medium"></div>

                <form id="loginForm" class="space-y-6" onsubmit="handleLogin(event)">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2" for="pin">6-Digit PIN</label>
                        <div class="relative">
                            <input
                                id="pin"
                                type="password"
                                inputmode="numeric"
                                pattern="[0-9]*"
                                maxlength="6"
                                autocomplete="one-time-code"
                                placeholder="••••••"
                                class="block w-full h-14 text-center text-3xl tracking-[0.8em] font-mono rounded-lg border-slate-300 bg-white text-slate-900 focus:ring-primary focus:border-primary placeholder:text-slate-300"
                                autofocus
                            >
                            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                                <span class="material-symbols-outlined text-slate-400">dialpad</span>
                            </div>
                        </div>
                    </div>

                    <button id="loginBtn" type="submit" class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 group">
                        <span id="loginBtnText">Sign In</span>
                        <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </button>
                </form>

                <div class="mt-8 text-center text-sm text-slate-500">
                    Need help? Contact System Administrator
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="pwa-init.js"></script>
    <script>
        const pinInput = document.getElementById('pin');
        const alertBox = document.getElementById('alert');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const API_BASE_URL = typeof BASE_URL !== 'undefined' ? BASE_URL : 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/usercallback';
        const menuPanel = document.getElementById('menuPanel');
        const menuBtn = document.getElementById('menuBtn');
        const LOGIN_ATTEMPTS_KEY = 'workToolLoginAttempts';
        const LOGIN_LOCK_UNTIL_KEY = 'workToolLoginLockUntil';
        const MAX_LOGIN_ATTEMPTS = 5;
        const LOCKOUT_MS = 10 * 60 * 1000;

        function getRemainingLockSeconds() {
            const lockUntil = Number(localStorage.getItem(LOGIN_LOCK_UNTIL_KEY) || 0);
            const remainingMs = lockUntil - Date.now();
            return remainingMs > 0 ? Math.ceil(remainingMs / 1000) : 0;
        }

        function registerFailedLogin() {
            const current = Number(localStorage.getItem(LOGIN_ATTEMPTS_KEY) || 0) + 1;
            localStorage.setItem(LOGIN_ATTEMPTS_KEY, String(current));

            if (current >= MAX_LOGIN_ATTEMPTS) {
                localStorage.setItem(LOGIN_LOCK_UNTIL_KEY, String(Date.now() + LOCKOUT_MS));
                localStorage.setItem(LOGIN_ATTEMPTS_KEY, '0');
            }
        }

        function clearLoginRateLimit() {
            localStorage.removeItem(LOGIN_ATTEMPTS_KEY);
            localStorage.removeItem(LOGIN_LOCK_UNTIL_KEY);
        }

        function handleBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function toggleMenu() {
            menuPanel.classList.toggle('hidden');
        }

        function clearPin() {
            pinInput.value = '';
            pinInput.focus();
            menuPanel.classList.add('hidden');
        }

        function validatePinViaBackend(pin) {
            return new Promise((resolve, reject) => {
                const cbName = `__login_validate_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
                const params = new URLSearchParams({ action: 'validatePin', pin, callback: cbName });
                const url = `${API_BASE_URL}?${params.toString()}`;

                let timeout = setTimeout(() => {
                    cleanup();
                    reject(new Error('Timeout: PIN validation took too long'));
                }, 20000);

                function cleanup() {
                    clearTimeout(timeout);
                    try { delete window[cbName]; } catch {}
                    if (script && script.parentNode) script.parentNode.removeChild(script);
                }

                window[cbName] = (result) => {
                    cleanup();
                    resolve(result);
                };

                const script = document.createElement('script');
                script.src = url;
                script.async = true;
                script.onerror = () => {
                    cleanup();
                    reject(new Error('Network error loading PIN validation'));
                };
                document.head.appendChild(script);
            });
        }

        pinInput.addEventListener('keypress', (e) => {
            if (!/[0-9]/.test(e.key)) e.preventDefault();
        });

        pinInput.addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        document.addEventListener('click', (event) => {
            if (!menuPanel.contains(event.target) && !menuBtn.contains(event.target)) {
                menuPanel.classList.add('hidden');
            }
        });

        async function handleLogin(event) {
            event.preventDefault();
            const pin = pinInput.value.trim();
            hideAlert();

            const lockRemaining = getRemainingLockSeconds();
            if (lockRemaining > 0) {
                const mins = Math.ceil(lockRemaining / 60);
                showAlert(`Too many failed attempts. Try again in ${mins} minute(s).`, 'error');
                return;
            }

            if (pin.length !== 6) {
                showAlert('Please enter 6 digits', 'error');
                return;
            }

            if (!/^[0-9]{6}$/.test(pin)) {
                showAlert('PIN must be numbers only', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtnText.textContent = 'Verifying...';
            pinInput.disabled = true;

            try {
                const result = await validatePinViaBackend(pin);
                if (result.authenticated && result.status === 'success') {
                    showAlert('PIN verified! Redirecting to Dashboard...', 'success');
                    try {
                        if (typeof setAuthSession === 'function') {
                            setAuthSession(result.token || '');
                        } else {
                            sessionStorage.setItem('workToolAuth', 'true');
                            if (result.token) sessionStorage.setItem('workToolAuthToken', result.token);
                        }
                        clearLoginRateLimit();
                    } catch {}
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                } else {
                    registerFailedLogin();
                    showAlert(result.message || 'Invalid PIN. Please try again.', 'error');
                    pinInput.value = '';
                    pinInput.focus();
                    loginBtn.disabled = false;
                    loginBtnText.textContent = 'Sign In';
                    pinInput.disabled = false;
                }
            } catch (error) {
                registerFailedLogin();
                showAlert('Connection error. Please try again or check your network.', 'error');
                pinInput.value = '';
                pinInput.focus();
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Sign In';
                pinInput.disabled = false;
            }
        }

        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = 'mb-6 rounded-lg border p-4 text-sm font-medium block';
            if (type === 'success') {
                alertBox.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
            } else {
                alertBox.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                setTimeout(() => hideAlert(), 4000);
            }
        }

        function hideAlert() {
            alertBox.className = 'hidden mb-6 rounded-lg border p-4 text-sm font-medium';
            alertBox.textContent = '';
        }
    </script>
</body>
</html>
