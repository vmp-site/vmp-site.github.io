<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Work Manager</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; background:#f6f6f8; color:#111827; margin:0; min-height:100vh; display:grid; place-items:center; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:24px; width:min(92vw, 420px); box-shadow:0 8px 30px rgba(0,0,0,.06); }
    h1 { margin:0 0 8px; font-size:22px; }
    p { margin:0; color:#4b5563; line-height:1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Offline Mode</h1>
    <p>App opens offline, but latest data sync needs internet. Please reconnect and refresh to fetch new records.</p>
  </div>
</body>
</html>
