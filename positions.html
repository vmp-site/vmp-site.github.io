<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Manager - Positions</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#144bb8',
                        'background-light': '#f6f6f8'
                    },
                    fontFamily: {
                        display: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
        .action-buttons { display: flex; gap: 8px; justify-content: center; }
        .btn-action {
            height: 34px;
            width: 34px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-edit { background: #dbeafe; color: #0c4a6e; }
        .btn-edit:hover { background: #bfdbfe; }
        .btn-delete { background: #fee2e2; color: #991b1b; }
        .btn-delete:hover { background: #fecaca; }
        .amount-cell {
            color: #0f172a;
            font-weight: 600;
            text-align: center;
        }
        .table-cell-center { text-align: center; }
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .type-new { background: #dbeafe; color: #1e40af; }
        .type-old { background: #e0e7ff; color: #3730a3; }
        .row-number { color: #64748b; }
        .row-title { color: #0f172a; font-weight: 600; }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
        }
        .modal-content {
            width: 100%;
            max-width: 560px;
            margin: 5% auto;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 16px;
            font-weight: 700;
        }
        .close-modal {
            float: right;
            color: #64748b;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
        }
        .close-modal:hover { color: #0f172a; }
        .modal-form-body { padding: 16px 20px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: 600; }
        .modal-save { background: #144bb8; color: white; }
        .modal-save:hover { background: #123f99; }
        .modal-cancel { background: #e2e8f0; color: #334155; }
        .modal-cancel:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-background-light text-slate-900 min-h-screen flex flex-col">
    <header class="sticky top-0 z-20 bg-white border-b border-slate-200 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <button class="h-10 w-10 grid place-items-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100" aria-label="Back" onclick="handleBack()">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                </button>
                <div class="flex items-center gap-2">
                    <div class="bg-primary text-white p-2 rounded-lg"><span class="material-symbols-outlined block">badge</span></div>
                    <div class="flex flex-col leading-tight">
                        <span class="text-[11px] uppercase tracking-wider text-slate-500">Work Manager</span>
                        <h1 class="text-lg font-bold tracking-tight">Positions</h1>
                    </div>
                </div>
            </div>
            <div class="relative flex items-center gap-2">
                <button id="menuBtn" class="h-10 w-10 grid place-items-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100" aria-label="Menu" type="button" onclick="toggleMenu()">
                    <span class="material-symbols-outlined text-[20px]">more_vert</span>
                </button>
                <a href="profile.html" class="h-10 w-10 grid place-items-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100" aria-label="Profile">
                    <span class="material-symbols-outlined text-[22px]">account_circle</span>
                </a>
                <button class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg border border-primary/20 text-primary font-semibold hover:bg-primary/5" type="button" onclick="logout()">
                    <span class="material-symbols-outlined text-[20px]">logout</span>
                    <span>Logout</span>
                </button>
                <div id="menuPanel" class="hidden absolute right-0 top-12 min-w-44 bg-white border border-slate-200 rounded-lg shadow-lg py-1 z-20">
                    <a href="index.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Dashboard</a>
                    <a href="workers.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Workers</a>
                    <a href="attendance-form.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Attendance</a>
                    <button type="button" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-5 pb-24 space-y-5">
        <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-100">
                <h2 class="text-base font-semibold">Add Position</h2>
            </div>
            <div class="p-5">
                <form id="rateForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label for="positionName" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Position Name</label>
                        <select id="positionName" name="positionName" title="Position Name" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                            <option value="">Select Position</option>
                            <option value="Karigar">Karigar</option>
                            <option value="Majur">Majur</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label for="workerType" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Type</label>
                        <select id="workerType" name="workerType" title="Worker Type" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                            <option value="">Select Type</option>
                            <option value="New">New</option>
                            <option value="Old">Old</option>
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label for="fullRate" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Full Day Rate (₹)</label>
                        <input type="number" id="fullRate" name="fullRate" step="0.01" placeholder="0.00" title="Full Day Rate" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                    </div>

                    <div class="space-y-1.5">
                        <label for="halfRate" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Half Day Rate (₹)</label>
                        <input type="number" id="halfRate" name="halfRate" step="0.01" placeholder="0.00" title="Half Day Rate" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                    </div>

                    <div class="md:col-span-2 grid grid-cols-2 gap-3 mt-1">
                        <button type="submit" class="h-11 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90">Save</button>
                        <button type="button" class="h-11 rounded-lg border border-slate-300 text-slate-700 font-semibold hover:bg-slate-100" onclick="document.getElementById('rateForm').reset()">Clear</button>
                    </div>
                </form>
            </div>
        </section>

        <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-base font-semibold">All Positions</h2>
            </div>
            <div>
                <table class="w-full text-sm table-fixed">
                    <thead class="bg-primary text-white">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">S.No</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider">Position Name</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold uppercase tracking-wider">Type</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold uppercase tracking-wider">Full Rate (₹)</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold uppercase tracking-wider">Half Rate (₹)</th>
                            <th class="px-4 py-3 text-center text-xs font-semibold uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ratesBody">
                        <tr>
                            <td colspan="6" class="px-4 py-8 text-center text-slate-500">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <div class="modal-header">Edit Position</div>
            <form id="editForm" class="modal-form-body">
                <div class="space-y-1.5 mb-3">
                    <label for="editPositionName" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Position Name</label>
                    <select id="editPositionName" name="editPositionName" title="Edit Position Name" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                        <option value="">Select Position</option>
                        <option value="Karigar">Karigar</option>
                        <option value="Majur">Majur</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="space-y-1.5 mb-3">
                    <label for="editWorkerType" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Type</label>
                    <select id="editWorkerType" name="editWorkerType" title="Edit Worker Type" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                        <option value="">Select Type</option>
                        <option value="New">New</option>
                        <option value="Old">Old</option>
                    </select>
                </div>

                <div class="space-y-1.5 mb-3">
                    <label for="editFullRate" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Full Day Rate (₹)</label>
                    <input type="number" id="editFullRate" name="editFullRate" step="0.01" placeholder="0.00" title="Edit Full Rate" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                </div>

                <div class="space-y-1.5">
                    <label for="editHalfRate" class="text-xs font-semibold uppercase tracking-wider text-slate-500">Half Day Rate (₹)</label>
                    <input type="number" id="editHalfRate" name="editHalfRate" step="0.01" placeholder="0.00" title="Edit Half Rate" required class="w-full rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                </div>

                <div class="modal-buttons">
                    <button type="button" class="modal-cancel" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="modal-save">Update</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-20">
        <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between">
            <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 hover:text-primary" href="index.html">
                <span class="material-symbols-outlined text-[24px]">home</span>
                <span class="text-[10px] font-medium uppercase tracking-wider">Home</span>
            </a>
            <a class="flex flex-1 flex-col items-center gap-1 text-primary" href="positions.html">
                <span class="material-symbols-outlined text-[24px]">add_circle</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Add</span>
            </a>
            <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 hover:text-primary" href="report.html">
                <span class="material-symbols-outlined text-[24px]">swap_horiz</span>
                <span class="text-[10px] font-medium uppercase tracking-wider">Transactions</span>
            </a>
            <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 hover:text-primary" href="profile.html">
                <span class="material-symbols-outlined text-[24px]">account_circle</span>
                <span class="text-[10px] font-medium uppercase tracking-wider">Profile</span>
            </a>
        </div>
    </nav>

    <script src="config.js"></script>
    <script src="positions.js"></script>
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuPanel = document.getElementById('menuPanel');

        function handleBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function toggleMenu() {
            menuPanel.classList.toggle('hidden');
        }

        document.addEventListener('click', (event) => {
            if (!menuPanel.contains(event.target) && !menuBtn.contains(event.target)) {
                menuPanel.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
