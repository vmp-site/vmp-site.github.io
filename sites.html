<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Manager - Sites</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#144bb8',
                        'background-light': '#f6f6f8'
                    },
                    fontFamily: {
                        display: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; min-height: 100dvh; }
    </style>
</head>
<body class="bg-background-light text-slate-900 min-h-screen flex flex-col">
    <header class="sticky top-0 z-20 bg-white border-b border-slate-200 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
                <button class="h-10 w-10 grid place-items-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100" aria-label="Back" onclick="handleBack()">
                    <span class="material-symbols-outlined text-[20px]">arrow_back</span>
                </button>
                <div class="flex flex-col leading-tight">
                    <span class="text-[11px] uppercase tracking-wider text-slate-500">Work Manager</span>
                    <h1 class="text-lg font-bold tracking-tight">Sites</h1>
                </div>
            </div>
            <div class="relative flex items-center gap-2">
                <button id="menuBtn" class="h-10 w-10 grid place-items-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100" aria-label="Menu" type="button" onclick="toggleMenu()">
                    <span class="material-symbols-outlined text-[20px]">more_vert</span>
                </button>
                <a href="profile.html" class="h-10 w-10 grid place-items-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100" aria-label="Profile">
                    <span class="material-symbols-outlined text-[22px]">account_circle</span>
                </a>
                <button class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg border border-primary/20 text-primary font-semibold hover:bg-primary/5" type="button" onclick="logout()">
                    <span class="material-symbols-outlined text-[20px]">logout</span>
                    <span>Logout</span>
                </button>
                <div id="menuPanel" class="hidden absolute right-0 top-12 min-w-44 bg-white border border-slate-200 rounded-lg shadow-lg py-1 z-20">
                    <a href="index.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Dashboard</a>
                    <a href="profile.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50">Profile</a>
                    <button type="button" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-5 pb-24">
        <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-4">
            <div class="p-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-lg font-bold">Add Site</h2>
            </div>
            <div class="p-4">
                <form id="addSiteForm" class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
                    <div>
                        <label for="site_name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Site Name</label>
                        <input type="text" id="site_name" placeholder="Enter site name" required class="w-full h-11 rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                    </div>
                    <div>
                        <label for="client_name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Client</label>
                        <input type="text" id="client_name" placeholder="Enter client name" required class="w-full h-11 rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                    </div>
                    <div>
                        <label for="location" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Location</label>
                        <input type="text" id="location" placeholder="Enter location" required class="w-full h-11 rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                    </div>
                    <button type="submit" class="h-11 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90">Add Site</button>
                </form>
            </div>
        </section>

        <section class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center gap-3 md:justify-between">
                <h2 class="text-lg font-bold">Sites List</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 w-full md:w-auto md:min-w-[440px]">
                    <div class="relative">
                        <span class="material-symbols-outlined text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 text-[20px]">search</span>
                        <input id="siteSearch" type="text" placeholder="Search by site/client/location" class="w-full h-10 pl-10 rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                    </div>
                    <select id="statusFilter" aria-label="Filter sites by status" title="Filter sites by status" class="h-10 rounded-lg border-slate-300 focus:border-primary focus:ring-primary">
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full min-w-[680px]">
                    <thead class="bg-primary text-white">
                        <tr>
                            <th class="px-3 py-2 text-center text-xs font-semibold uppercase tracking-wider">S.No</th>
                            <th class="px-3 py-2 text-center text-xs font-semibold uppercase tracking-wider">Site Name</th>
                            <th class="px-3 py-2 text-center text-xs font-semibold uppercase tracking-wider">Location</th>
                            <th class="px-3 py-2 text-center text-xs font-semibold uppercase tracking-wider">Client</th>
                            <th class="px-3 py-2 text-center text-xs font-semibold uppercase tracking-wider">Status</th>
                            <th class="px-3 py-2 text-center text-xs font-semibold uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sitesBody">
                        <tr>
                            <td colspan="6" class="px-4 py-10 text-center text-slate-500">Loading sites...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 z-20">
        <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between">
            <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 hover:text-primary" href="index.html">
                <span class="material-symbols-outlined text-[24px]">home</span>
                <span class="text-[10px] font-medium uppercase tracking-wider">Home</span>
            </a>
            <a class="flex flex-1 flex-col items-center gap-1 text-primary" href="sites.html">
                <span class="material-symbols-outlined text-[24px]">add_circle</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Add</span>
            </a>
            <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 hover:text-primary" href="report.html">
                <span class="material-symbols-outlined text-[24px]">swap_horiz</span>
                <span class="text-[10px] font-medium uppercase tracking-wider">Transactions</span>
            </a>
            <a class="flex flex-1 flex-col items-center gap-1 text-slate-500 hover:text-primary" href="profile.html">
                <span class="material-symbols-outlined text-[24px]">account_circle</span>
                <span class="text-[10px] font-medium uppercase tracking-wider">Profile</span>
            </a>
        </div>
    </nav>

    <script src="config.js"></script>
    <script src="sites.js"></script>
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuPanel = document.getElementById('menuPanel');

        function handleBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }

        function toggleMenu() {
            menuPanel.classList.toggle('hidden');
        }

        document.addEventListener('click', (event) => {
            if (!menuPanel.contains(event.target) && !menuBtn.contains(event.target)) {
                menuPanel.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
